<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master L • Cyber Glass Metal</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(0, 255, 255, .08), transparent 60%),
        radial-gradient(900px 500px at 80% 80%, rgba(124, 58, 237, .10), transparent 60%),
        #000;
      isolation: isolate;
    }

    .scanlines::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.03) 0px,
        rgba(255,255,255,.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      mix-blend-mode: soft-light;
      z-index: 5;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, .08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, .08) 1px, transparent 1px);
      background-size: 70px 70px;
      transform: perspective(900px) rotateX(65deg) scale(1.4) translateY(28%);
      opacity: .35;
      filter: blur(.2px);
      z-index: 1;
      animation: gridMove 10s linear infinite;
    }

    @keyframes gridMove {
      from { background-position: 0 0, 0 0; }
      to { background-position: 0 70px, 70px 0; }
    }

    .name-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 3;
    }

    .name {
      position: relative;
      font-size: clamp(54px, 13vw, 210px);
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: transparent;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.95) 0%,
          rgba(194, 208, 224, .95) 18%,
          rgba(245, 250, 255, .98) 34%,
          rgba(136, 148, 164, .95) 48%,
          rgba(230, 239, 248, .98) 64%,
          rgba(108, 121, 136, .95) 80%,
          rgba(250, 253, 255, .98) 100%
        );
      -webkit-background-clip: text;
      background-clip: text;

      text-shadow:
        0 2px 0 rgba(255,255,255,.25),
        0 14px 28px rgba(0,0,0,.55),
        0 0 24px rgba(34, 211, 238, .22),
        0 0 36px rgba(124, 58, 237, .20);

      transform-style: preserve-3d;
      animation: floaty 4.8s ease-in-out infinite;
    }

    .name::before,
    .name::after {
      content: "MASTER L";
      position: absolute;
      inset: 0;
      pointer-events: none;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Glass sheen */
    .name::before {
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.82) 45%,
        rgba(255,255,255,0) 55%
      );
      mix-blend-mode: screen;
      filter: blur(.3px);
      animation: shine 3.4s ease-in-out infinite;
    }

    /* Chromatic edge */
    .name::after {
      background: linear-gradient(90deg, rgba(34,211,238,.9), rgba(124,58,237,.9));
      transform: translate(2px, 1px);
      opacity: .22;
      filter: blur(1px);
    }

    @keyframes shine {
      0%, 100% { transform: translateX(-120%); opacity: 0; }
      18% { opacity: .9; }
      40% { transform: translateX(120%); opacity: .7; }
      60%, 100% { opacity: 0; }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.01); }
    }

    .frame {
      position: absolute;
      inset: 30px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 18px;
      box-shadow:
        inset 0 0 18px rgba(255,255,255,.08),
        0 0 22px rgba(34,211,238,.15);
      z-index: 2;
      pointer-events: none;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(145deg, rgba(255,255,255,.14), rgba(255,255,255,0) 38%);
      pointer-events: none;
    }

    .subtitle {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      color: rgba(203, 213, 225, .9);
      letter-spacing: .18em;
      text-transform: uppercase;
      font-size: clamp(10px, 1.1vw, 16px);
      z-index: 4;
      text-shadow: 0 0 12px rgba(34,211,238,.35);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="scene scanlines">
    <div class="grid"></div>
    <div class="frame"></div>

    <div class="name-wrap">
      <div class="name">MASTER L</div>
    </div>

    <div class="subtitle">Cyber • Glass • Metal</div>
  </div>
</body>
</html>
